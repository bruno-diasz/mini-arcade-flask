<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if question %}Editar{% else %}Nova{% endif %} Pergunta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h2>{% if question %}Editar{% else %}Nova{% endif %} Pergunta</h2>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            <div class="mb-3">
                                <label for="text" class="form-label">Pergunta</label>
                                <textarea name="text" class="form-control" rows="3" required>{% if question %}{{ question.text }}{% endif %}</textarea>
                            </div>
                            <div class="mb-3">
                                <label for="option_a" class="form-label">Alternativa A</label>
                                <input type="text" name="option_a" class="form-control" value="{% if question %}{{ question.option_a }}{% endif %}" required>
                            </div>
                            <div class="mb-3">
                                <label for="option_b" class="form-label">Alternativa B</label>
                                <input type="text" name="option_b" class="form-control" value="{% if question %}{{ question.option_b }}{% endif %}" required>
                            </div>
                            <div class="mb-3">
                                <label for="option_c" class="form-label">Alternativa C</label>
                                <input type="text" name="option_c" class="form-control" value="{% if question %}{{ question.option_c }}{% endif %}" required>
                            </div>
                            <div class="mb-3">
                                <label for="correct_answer" class="form-label">Resposta Correta</label>
                                <select name="correct_answer" class="form-control" required>
                                    <option value="A" {% if question and question.correct_answer == 'A' %}selected{% endif %}>A</option>
                                    <option value="B" {% if question and question.correct_answer == 'B' %}selected{% endif %}>B</option>
                                    <option value="C" {% if question and question.correct_answer == 'C' %}selected{% endif %}>C</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success">Salvar</button>
                            <a href="/admin/questions" class="btn btn-secondary">Cancelar</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

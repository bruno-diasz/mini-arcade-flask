<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinhar Número</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white text-center">
                        <h2>🔢 Adivinhar Número</h2>
                    </div>
                    <div class="card-body">
                        {% if message %}
                            <div class="alert alert-info">{{ message }}</div>
                            {% if correct %}
                                <a href="/guess/reset" class="btn btn-primary">Jogar Novamente</a>
                            {% endif %}
                        {% else %}
                            <p>Adivinhe um número entre 1 e 100:</p>
                            <form method="post">
                                <div class="mb-3">
                                    <input type="number" name="guess" class="form-control" min="1" max="100" required>
                                </div>
                                <button type="submit" class="btn btn-success">Adivinhar</button>
                            </form>
                        {% endif %}
                        <br>
                        <a href="/" class="btn btn-secondary">Voltar ao Início</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

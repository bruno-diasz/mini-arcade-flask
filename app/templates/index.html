<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Arcade Educativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h1>🎮 Mini Arcade Educativo</h1>
                    </div>
                    <div class="card-body text-center">
                        <p class="lead">Escolha um jogo para jogar!</p>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <a href="/guess" class="btn btn-success btn-lg w-100">
                                    🔢 Adivinhar Número
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="/quiz" class="btn btn-info btn-lg w-100">
                                    🐶 Quiz de Animais
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="/draw" class="btn btn-warning btn-lg w-100">
                                    🎨 Desafio de Desenho
                                </a>
                            </div>
                        </div>
                        <hr>
                        <a href="/admin" class="btn btn-secondary">Administração</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
